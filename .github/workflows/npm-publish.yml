name: Publish npm package

on:
  push:
    branches:
      - main
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      version_bump:
        description: Version bump to apply before publishing
        type: choice
        required: true
        default: patch
        options:
          - patch
          - minor
          - major
          - none

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    name: Publish to npm
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Bump package version
        if: github.event_name == 'workflow_dispatch' && inputs.version_bump != 'none'
        run: npm version ${{ inputs.version_bump }} --no-git-tag-version

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Check package version
        id: package
        run: |
          name=$(node -p "require('./package.json').name")
          version=$(node -p "require('./package.json').version")
          echo "name=$name" >> "$GITHUB_OUTPUT"
          echo "version=$version" >> "$GITHUB_OUTPUT"

          if npm view "$name@$version" version > /dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "$name@$version is already published; skipping npm publish."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit version bump
        if: github.event_name == 'workflow_dispatch' && inputs.version_bump != 'none'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add package.json package-lock.json
          git commit -m "Bump package version for npm publish"
          git push

      - name: Publish
        if: steps.package.outputs.published != 'true'
        run: npm publish --access public --provenance --ignore-scripts
